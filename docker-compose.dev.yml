# docker-compose.dev.yml
# Development mode — hot reload via bind mounts
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build
#
# node_modules anonymous volumes ensure the container's installed
# packages are NOT overridden by the (empty) host directory.

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev          # selects the "dev" stage in backend/Dockerfile
    container_name: ezynotes-backend-dev
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app           # bind-mount source for hot reload
      - /app/node_modules        # anonymous volume — keep container's node_modules
    environment:
      - NODE_ENV=development
      - PORT=3001
      - FRONTEND_URL=http://localhost:3000
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_DB_URL=${SUPABASE_DB_URL}
    networks:
      - ezynotes-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev          # selects the "dev" stage in frontend/Dockerfile
    container_name: ezynotes-frontend-dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app          # bind-mount source for hot reload
      - /app/node_modules        # anonymous volume — keep container's node_modules
      - /app/.next               # anonymous volume — keep container's Next.js cache
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    depends_on:
      - backend
    networks:
      - ezynotes-network

networks:
  ezynotes-network:
    driver: bridge

# docker-compose.dev.yml
# Development mode — hot reload via bind mounts
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build
#
# node_modules anonymous volumes ensure the container's installed
# packages are NOT overridden by the (empty) host directory.

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev          # selects the "dev" stage in backend/Dockerfile
    container_name: ezynotes-backend-dev
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app           # bind-mount source for hot reload
      - /app/node_modules        # anonymous volume — keep container's node_modules
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
      - PORT=3001
      - FRONTEND_URL=http://localhost:3000
      - PYTHON_ML_URL=http://ml:8000
    depends_on:
      - ml
    networks:
      - ezynotes-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev          # selects the "dev" stage in frontend/Dockerfile
    container_name: ezynotes-frontend-dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app          # bind-mount source for hot reload
      - /app/node_modules        # anonymous volume — keep container's node_modules
      - /app/.next               # anonymous volume — keep container's Next.js cache
    env_file:
      - ./frontend/.env.local
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api
      # Polling is required on Windows — Docker bind-mounts don't propagate
      # inotify events from the host, so watchers must fall back to polling.
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    networks:
      - ezynotes-network

  ml:
    build:
      context: ./services/ml
      dockerfile: Dockerfile
    container_name: ezynotes-ml-dev
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - HUGGINGFACE_CACHE_DIR=/app/model-cache
    volumes:
      - ./services/ml:/app
      - /app/__pycache__
      - ml-cache:/app/model-cache
    networks:
      - ezynotes-network

networks:
  ezynotes-network:
    driver: bridge

volumes:
  ml-cache:

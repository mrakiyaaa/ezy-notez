# docker-compose.prod.yml
# Production mode — optimised images, no volume mounts
#
# Usage:
#   docker compose -f docker-compose.prod.yml up --build

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod         # selects the "prod" stage in backend/Dockerfile
    container_name: ezynotes-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - FRONTEND_URL=http://localhost:3000
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_DB_URL=${SUPABASE_DB_URL}
    networks:
      - ezynotes-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod         # selects the "prod" stage in frontend/Dockerfile
      args:
        # NEXT_PUBLIC_* vars must be passed at BUILD time so Next.js can inline
        # them into the client bundle. Set BACKEND_PUBLIC_URL in your .env to
        # the public URL of the backend (e.g. https://api.yourapp.com).
        - NEXT_PUBLIC_API_URL=${BACKEND_PUBLIC_URL}/api
        - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    container_name: ezynotes-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ezynotes-network
    restart: unless-stopped

networks:
  ezynotes-network:
    driver: bridge
